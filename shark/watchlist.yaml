# Serenity supply-chain watchlist — seeded from @aleabitoreddit posts + the
# Goldman Sachs CPO ecosystem map (compiled by GS Global Investment Research).
#
# RESEARCH ONLY — NOT FINANCIAL ADVICE.
#
# Caveats (read before trusting any code):
#   - Serenity himself notes "some tickers are wrong" — treat codes as leads to
#     verify, not facts. Unverified codes are marked `verify: true`.
#   - Prices / market caps / qualification status decay fast. Re-check before use.
#   - `ecosystem` = which customer roadmap the name sells into.
#   - `tier`: T1 high-conviction bottleneck pure play / T2 quality exposure /
#     T3 basket-only. These are analytical framing, not recommendations.
#   - `bottleneck: true` = critical-path, hard-to-second-source, pricing power.

