name: AI Quality Gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "my-website/**"
      - "wiki/**"
      - ".codex/**"
      - ".claude/**"
      - ".githooks/**"
      - "scripts/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: my-website/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run quality checks
        run: yarn verify:quality

